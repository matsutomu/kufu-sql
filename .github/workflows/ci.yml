name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run tests
        working-directory: ./backend
        run: go test ./... -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build ARM64 binary
        working-directory: ./backend
        run: GOOS=linux GOARCH=arm64 go build -o api ./cmd/api/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Deploy frontend to S3
        run: |
          # status.json（Lambdaが生成）・maintenance.html・_deploy/（backendバイナリの一時置き場）は
          # distに無いため、--deleteの削除対象から保護する
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/ --delete \
            --exclude "status.json" --exclude "maintenance.html" --exclude "_deploy/*"

          # service-hours.jsonはデフォルトビヘイビア（CachingOptimized）で配信されるため、
          # 時間変更が1日キャッシュされないようCache-Controlを短め（300秒）に設定して上書きする
          aws s3 cp frontend/dist/service-hours.json "s3://${{ secrets.S3_BUCKET_NAME }}/service-hours.json" \
            --cache-control "max-age=300" --content-type "application/json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ERPTQ4JQUVJ1A \
            --paths "/*"

      - name: Ensure EC2 instance is running
        run: |
          INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID }}

          # 1. 現在の状態を確認
          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)
          echo "instance state: $STATE"

          # 2. running でなければ起動して完了を待つ
          if [ "$STATE" != "running" ]; then
            aws ec2 start-instances --instance-ids "$INSTANCE_ID"
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
            echo "instance started"
          fi

          # 3. SSMエージェントが Online になるまで待つ（5秒間隔で最大30回）
          for i in $(seq 1 30); do
            PING=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null)
            if [ "$PING" = "Online" ]; then
              echo "SSM agent is online"
              exit 0
            fi
            echo "waiting for SSM agent... ($i/30, PingStatus=$PING)"
            sleep 5
          done
          echo "SSM agent did not come online in time" >&2
          exit 1

      - name: Upload backend binary to S3 (一時置き場。デプロイ完了後に削除する)
        run: aws s3 cp backend/api "s3://${{ secrets.S3_BUCKET_NAME }}/_deploy/api"

      - name: Deploy backend to EC2
        run: |
          # EC2のIAMロールにはS3読み取り権限が無いため、署名付きURLを発行してcurlで取得させる
          # （kufusql-frontendはCloudFrontのデフォルト振り分け先のため、_deploy/配下も理論上は
          #   短時間公開されうる。デプロイ完了後に必ず削除する運用でリスクを最小化する）
          PRESIGNED_URL=$(aws s3 presign "s3://${{ secrets.S3_BUCKET_NAME }}/_deploy/api" --expires-in 300)

          cat > /tmp/ssm-params.json <<EOF
          {
            "commands": [
              "curl -sfL -o /opt/kufu-sql/bin/api.new \"$PRESIGNED_URL\"",
              "chmod +x /opt/kufu-sql/bin/api.new",
              "mv /opt/kufu-sql/bin/api.new /opt/kufu-sql/bin/api",
              "systemctl restart kufu-sql"
            ]
          }
          EOF

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-params.json \
            --region ap-northeast-1 \
            --query "Command.CommandId" --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --region ap-northeast-1

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --region ap-northeast-1

      - name: Remove temporary binary from S3
        if: always()
        run: aws s3 rm "s3://${{ secrets.S3_BUCKET_NAME }}/_deploy/api" || true
