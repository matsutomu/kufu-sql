<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>ただいまサービス時間外です | kufu:SQL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #f5f3ee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a1a1a;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header .logo { font-weight: 700; font-size: 16px; }
    header .logo span { color: #f59e0b; }
    header .sub { font-size: 11px; color: #888; margin-left: 4px; }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    }
    .card svg { width: 180px; height: auto; margin-bottom: 18px; }
    h1 { font-size: 19px; color: #333; margin-bottom: 12px; }
    p { font-size: 13px; color: #888; line-height: 1.9; }
    .hours {
      display: inline-block;
      margin-top: 16px;
      background: #f5f3ee;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 13px;
      color: #4a7c59;
      font-weight: 600;
    }
    footer {
      text-align: center;
      font-size: 11px;
      color: #aaa;
      padding: 14px;
    }
    .zzz { animation: float 2.6s ease-in-out infinite; }
    .zzz.z2 { animation-delay: 0.5s; }
    .zzz.z3 { animation-delay: 1.0s; }
    @keyframes float {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50%      { transform: translateY(-5px); opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">kufu<span>:SQL</span></span>
    <span class="sub">工夫</span>
  </header>

  <main>
    <div class="card">
      <!-- 三日月とおやすみ中の猫 -->
      <svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="眠っている猫">
        <!-- 三日月 -->
        <path d="M168 22 a20 20 0 1 0 6 30 a15 15 0 1 1 -6 -30 z" fill="#f59e0b" opacity="0.9"/>
        <!-- 星 -->
        <circle cx="132" cy="18" r="2.2" fill="#f59e0b" opacity="0.6"/>
        <circle cx="150" cy="58" r="1.7" fill="#f59e0b" opacity="0.5"/>
        <circle cx="118" cy="42" r="1.5" fill="#f59e0b" opacity="0.4"/>
        <!-- Zzz -->
        <g fill="#4a7c59" font-family="sans-serif" font-weight="700">
          <text class="zzz"    x="96" y="52" font-size="15">Z</text>
          <text class="zzz z2" x="110" y="40" font-size="11">z</text>
          <text class="zzz z3" x="120" y="31" font-size="8">z</text>
        </g>
        <!-- 猫のからだ（丸くなって寝ている） -->
        <ellipse cx="72" cy="102" rx="46" ry="26" fill="#8d7b68"/>
        <!-- しっぽ -->
        <path d="M114 108 q18 4 12 -14 q-4 -10 -14 -6" fill="none" stroke="#8d7b68" stroke-width="9" stroke-linecap="round"/>
        <!-- 顔 -->
        <circle cx="52" cy="92" r="24" fill="#a1907d"/>
        <!-- 耳 -->
        <path d="M34 78 l4 -14 l12 9 z" fill="#a1907d"/>
        <path d="M70 78 l-4 -14 l-12 9 z" fill="#a1907d"/>
        <path d="M37 77 l3 -9 l8 6 z" fill="#e8b4b8"/>
        <path d="M67 77 l-3 -9 l-8 6 z" fill="#e8b4b8"/>
        <!-- 閉じた目 -->
        <path d="M40 92 q4 4 8 0" fill="none" stroke="#4a3f35" stroke-width="2" stroke-linecap="round"/>
        <path d="M56 92 q4 4 8 0" fill="none" stroke="#4a3f35" stroke-width="2" stroke-linecap="round"/>
        <!-- 鼻と口 -->
        <path d="M50 99 l4 0 l-2 3 z" fill="#e8b4b8"/>
        <path d="M52 102 q0 3 -4 3 M52 102 q0 3 4 3" fill="none" stroke="#4a3f35" stroke-width="1.4" stroke-linecap="round"/>
        <!-- ひげ -->
        <g stroke="#4a3f35" stroke-width="1" stroke-linecap="round" opacity="0.6">
          <path d="M30 96 l-10 -2"/><path d="M30 100 l-10 2"/>
          <path d="M74 96 l10 -2"/><path d="M74 100 l10 2"/>
        </g>
        <!-- 前足 -->
        <ellipse cx="58" cy="116" rx="10" ry="5" fill="#a1907d"/>
        <ellipse cx="78" cy="118" rx="10" ry="5" fill="#a1907d"/>
        <!-- 地面 -->
        <ellipse cx="80" cy="130" rx="70" ry="4" fill="#e5e0d5"/>
      </svg>

      <h1>ただいまサービス時間外です</h1>
      <p>
        kufu:SQL はおやすみ中です。<br>
        サービス時間内に、またお越しください。
      </p>
      <!-- サービス提供時間は運用に合わせて書き換えてください -->
      <div class="hours">サービス提供時間 7:00 〜 19:00（JST）</div>
    </div>
  </main>

  <footer>kufu:SQL — SQL練習サービス</footer>
</body>
</html>
